name: LiveVoice
type: application
platform: iOS
deploymentTarget: "16.0"

targets:
  LiveVoice:
    type: application
    platform: iOS
    sources:
      - path: ./
        excludes:
          - "**/*.yml"
          - "Info.plist"
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.LiveVoice
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        # Swift ve UI ayarları
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1" # Sadece iPhone
        DEVELOPMENT_TEAM: "" # Sideloadly ile yükleneceği için boş bırakılabilir
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
